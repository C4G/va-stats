name: Build and Lint

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  main:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install pnpm
        run: |
          npm install -g pnpm@latest
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run type check
        run: pnpm type-check

      - name: Run prettier check
        run: pnpm format

      - name: Run tests
        run: pnpm test

      - name: Build production image and verify it boots
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          # The database is external; CI only verifies the app builds and the
          # (DB-independent) health endpoint responds. Dummy values keep
          # NextAuth and the MySQL client from erroring at startup.
          NEXTAUTH_SECRET: ci-dummy-secret
          JWT_SECRET: ci-dummy-secret
          MYSQL_HOST: localhost
          MYSQL_DATABASE: ci
          MYSQL_USER: ci
          MYSQL_PASSWORD: ci
        run: |
          docker compose -f ./docker-compose.yml -p "va-stats-pr-${PR_NUMBER}" up --build -d

          echo "Waiting for the app to become healthy..."
          for i in {1..60}; do
            if docker compose -p "va-stats-pr-${PR_NUMBER}" ps | grep -q "va-stats-app.*healthy"; then
              echo "App is healthy!"
              break
            fi
            status=$(docker compose -p "va-stats-pr-${PR_NUMBER}" ps va-stats-app 2>&1 || echo "error")
            if [ $i -eq 60 ]; then
              echo "App failed to become healthy"
              echo "Final status: $status"
              docker compose -p "va-stats-pr-${PR_NUMBER}" logs
              exit 1
            fi
            echo "Waiting... (attempt $i/60)"
            sleep 2
          done

      - name: Clean up
        if: always()
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          docker compose -p "va-stats-pr-${PR_NUMBER}" -f ./docker-compose.yml down --volumes --remove-orphans || true
          docker ps -a --filter "name=va-stats-pr-${PR_NUMBER}" -q | xargs -r docker rm -f || true
          docker network ls --filter "name=va-stats-pr-${PR_NUMBER}" -q | xargs -r docker network rm || true
